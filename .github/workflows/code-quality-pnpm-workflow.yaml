# yaml-language-server: $schema=https://json.schemastore.org/github-workflow.json
name: Code quality & build checks

# Reusable workflow for code quality and build checks in pnpm projects.
# Consumers must provide a check-command input specifying the command to run.

on:
  workflow_call:
    inputs:
      check-command:
        type: string
        required: true
        description: Command to run code quality and build checks (e.g., "pnpm run ci", "nmr ci")
      node-version:
        type: string
        default: '24.14.1'
      pnpm-version:
        type: string
        default: '10.33.0'

jobs:
  code-quality:
    name: Code quality
    runs-on: ubuntu-latest
    timeout-minutes: 15

    concurrency:
      group: ${{ github.workflow }}-${{ github.ref }}
      cancel-in-progress: true

    env:
      GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: ${{ inputs.pnpm-version }}
          run_install: false

      - name: Set up Node.js
        uses: actions/setup-node@v5
        with:
          node-version: ${{ inputs.node-version }}
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install

      - name: Run code quality & build checks
        run: ${{ inputs.check-command }}
