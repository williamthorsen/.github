# yaml-language-server: $schema=https://json.schemastore.org/github-workflow.json
name: Code quality & build checks

# This workflow runs code quality checks on push and pull request events
# It uses pnpm run ci to run all checks, which includes:
# - Type checking
# - Formatting checks
# - Linting
# - Tests with coverage
# - Security audits
# - Building all packages in the monorepo
#
# Note: This workflow will be automatically skipped if the commit message includes
# any of the following strings: [skip ci], [ci skip], [no ci], [skip actions], or [actions skip]

on:
  workflow_call:
    inputs:
      node-version:
        required: true
        type: string
      pnpm-version:
        required: true
        type: string
    secrets:
      # Allows a consumer to add this token to the environment, typically for use in `.npmrc`
      GH_PACKAGES_TOKEN:
        required: false

jobs:
  code-quality:
    name: Code quality
    runs-on: ubuntu-latest
    timeout-minutes: 15

    concurrency:
      group: ${{ github.workflow }}-${{ github.ref }}
      cancel-in-progress: true

    env:
      GH_PACKAGES_TOKEN: ${{ secrets.GH_PACKAGES_TOKEN }}
      GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: ${{ inputs.pnpm-version }}
          run_install: false

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ inputs.node-version }}
          cache: 'pnpm'

      - name: Install dependencies
        run: |
          pnpm config set auto-install-peers false
          pnpm install

      - name: Run code quality & build checks
        run: pnpm run ci
